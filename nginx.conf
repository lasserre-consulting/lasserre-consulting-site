map $http_accept_language $lang_redirect {
    default     "fr";
    ~*^en       "en";
    ~*^fr       "fr";
}

server {
    listen 8080;
    server_name _;

    server_tokens off;

    add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "geolocation=(), microphone=(), camera=(), payment=(), usb=(), interest-cohort=(), browsing-topics=()" always;
    add_header Content-Security-Policy "default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src 'self' https://fonts.gstatic.com; img-src 'self' data: https://www.lasserre-consulting.fr; connect-src 'self'; frame-src 'none'; frame-ancestors 'none'; base-uri 'self'; form-action 'self'; object-src 'none'; upgrade-insecure-requests;" always;

    # Redirect root to locale based on Accept-Language
    location = / {
        return 302 /$lang_redirect/;
    }

    # French locale
    location /fr/ {
        alias /usr/share/nginx/html/fr/;
        index index.html;
        try_files $uri $uri/ /fr/index.html;
    }

    # English locale
    location /en/ {
        alias /usr/share/nginx/html/en/;
        index index.html;
        try_files $uri $uri/ /en/index.html;
    }

    # Do not cache HTML (chunks are hashed, but index.html must be revalidated)
    location ~* \.html$ {
        add_header Cache-Control "no-cache, must-revalidate" always;
        expires 0;
    }

    # Cache static assets aggressively
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff2?|webmanifest)$ {
        root /usr/share/nginx/html;
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # Gzip
    gzip on;
    gzip_vary on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml application/xml+rss text/javascript application/manifest+json;
    gzip_min_length 1000;
}

<section id="contact" class="contact-section">

  <!-- Decorative background blobs -->
  <div class="blob blob--1"></div>
  <div class="blob blob--2"></div>

  <div class="contact-container">

    <!-- Badge -->
    <span class="contact-badge" i18n="@@contact.badge">Contact</span>

    <!-- Title -->
    <h2 class="contact-title" i18n="@@contact.title">Travaillons ensemble</h2>
    <p class="contact-subtitle" i18n="@@contact.subtitle">
      Disponible pour missions longue durée.<br>
      Réponse sous <strong>24h</strong>.
    </p>

    <!-- Main CTA -->
    <div class="cta-group">
      <a href="mailto:contact@lasserre-consulting.fr" class="cta-button">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"
             stroke-linejoin="round">
          <path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"/>
          <polyline points="22,6 12,13 2,6"/>
        </svg>
        <ng-container i18n="@@contact.cta.mailto">Me contacter</ng-container>
      </a>
      <button class="copy-button" (click)="copyEmail()" [attr.aria-label]="copied ? ariaLabelCopied : ariaLabelCopy">
        @if (copied) {
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <polyline points="20 6 9 17 4 12"/>
          </svg>
          {{ labelCopied }}
        } @else {
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <rect x="9" y="9" width="13" height="13" rx="2" ry="2"/>
            <path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2 2v1"/>
          </svg>
          {{ labelCopy }}
        }
      </button>
    </div>

    <!-- Divider -->
    <div class="divider">
      <span class="divider-line"></span>
      <span class="divider-text" i18n="@@contact.divider">ou retrouvez-moi sur</span>
      <span class="divider-line"></span>
    </div>

    <!-- Social links -->
    <div class="social-links">
      <a
        href="https://www.linkedin.com/in/lasserrearnaud/"
        target="_blank"
        rel="noopener noreferrer"
        class="social-card social-card--linkedin"
        aria-label="LinkedIn">
        <div class="social-icon">
          <svg viewBox="0 0 24 24" fill="currentColor">
            <path
              d="M20.447 20.452h-3.554v-5.569c0-1.328-.027-3.037-1.852-3.037-1.853 0-2.136 1.445-2.136 2.939v5.667H9.351V9h3.414v1.561h.046c.477-.9 1.637-1.85 3.37-1.85 3.601 0 4.267 2.37 4.267 5.455v6.286zM5.337 7.433a2.062 2.062 0 0 1-2.063-2.065 2.064 2.064 0 1 1 2.063 2.065zm1.782 13.019H3.555V9h3.564v11.452zM22.225 0H1.771C.792 0 0 .774 0 1.729v20.542C0 23.227.792 24 1.771 24h20.451C23.2 24 24 23.227 24 22.271V1.729C24 .774 23.2 0 22.222 0h.003z"/>
          </svg>
        </div>
        <div class="social-info">
          <span class="social-name">LinkedIn</span>
          <span class="social-handle">lasserrearnaud</span>
        </div>
        <svg class="social-arrow" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <path d="M7 17L17 7M17 7H7M17 7v10"/>
        </svg>
      </a>

      <a
        href="https://www.malt.fr/profile/arnaudlasserre1"
        target="_blank"
        rel="noopener noreferrer"
        class="social-card social-card--malt"
        aria-label="Malt">
        <div class="social-icon social-icon--malt">
          <img ngSrc="/icon/malt.png" height="32" width="110" alt="">
        </div>
        <div class="social-info">
          <span class="social-name">Malt</span>
          <span class="social-handle">arnaudlasserre1</span>
        </div>
        <svg class="social-arrow" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <path d="M7 17L17 7M17 7H7M17 7v10"/>
        </svg>
      </a>
    </div>

    <!-- Footer note -->
    <p class="contact-note" i18n="@@contact.location">
      Basé à Toulouse · Disponible en remote et déplacements
    </p>

  </div>
</section>

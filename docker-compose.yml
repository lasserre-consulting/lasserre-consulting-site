services:
  frontend:
    build: .
    container_name: lasserre-consulting-site
    ports:
      - "127.0.0.1:4200:8080"
    restart: unless-stopped
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    read_only: true
    tmpfs:
      - /var/cache/nginx
      - /var/run
      - /tmp
